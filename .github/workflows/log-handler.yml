name: Remote Log Handler

on:
  repository_dispatch:
    types: [log_event]

jobs:
  update-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Write Execution Log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          MESSAGE="${{ github.event.client_payload.message }}"
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          
          echo "[$TIMESTAMP] [SUCCESS] $MESSAGE" >> daily_uptime.log
          
          git add daily_uptime.log
          git commit -m "infra: operations pulse check $TIMESTAMP" \
                     -m "Co-authored-by: pklavc <patrickajm@gmail.com>"
          
          git push
