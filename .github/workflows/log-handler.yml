name: Remote Log Handler

on:
  repository_dispatch:
    types: [log_event]

jobs:
  update-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Segurança de Logs e Mascaramento
        run: |
          # Mascara a mensagem recebida para evitar exibição nos logs do console
          echo "::add-mask::${{ github.event.client_payload.message }}"

      - name: Write Execution Log
        env:
          LOG_MESSAGE: ${{ github.event.client_payload.message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          
          # Garante que o arquivo existe
          touch daily_uptime.log
          
          echo "[$TIMESTAMP] [SUCCESS] $LOG_MESSAGE" >> daily_uptime.log
          
          git add daily_uptime.log
          
          # Verifica se há algo para commitar antes de disparar o comando
          git diff --quiet && git diff --staged --quiet || ( \
            git commit -m "infra: operations pulse check $TIMESTAMP" \
                       -m "Co-authored-by: pklavc <patrickajm@gmail.com>" && \
            git push \
          )
